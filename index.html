<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fontawesome -->
  <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <!-- Bootswatch Darkly Theme -->
  <link href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/darkly/bootstrap.min.css" rel="stylesheet" />
  <style>
    .task-board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
      margin-top: 2rem;
      transition: all 0.2s ease;
    }

    .task-card {
      background: rgba(34, 40, 49, 0.95);
      backdrop-filter: blur(2px);
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.2s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: none;
      position: relative;
    }

    .task-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 40px -14px black;
      background: rgba(40, 46, 57, 0.98);
    }

    /* cabecera estilo título */
    .card-header-custom {
      padding: 1.25rem 1.5rem 0.5rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: transparent;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #5bc0de;
      margin: 0;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title span {
      color: #f8f9fa;
    }

    .completed-title {
      text-decoration: line-through;
      opacity: 0.7;
    }

    .card-body-content {
      padding: 0.5rem 1.5rem 1rem 1.5rem;
      flex: 1;
    }

    .task-description {
      font-size: 0.95rem;
      color: #ced4da;
      margin-bottom: 1rem;
      line-height: 1.4;
      word-break: break-word;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.6rem 0.8rem;
      border-radius: 0.9rem;
    }

    .due-date-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      background: #2c303a;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      color: #adb5bd;
      width: fit-content;
      margin-bottom: 1rem;
    }

    .due-date-badge i {
      font-size: 0.75rem;
      color: #5bc0de;
    }

    .task-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0 0.8rem 0;
      padding-top: 0.3rem;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
    }

    .custom-check {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      user-select: none;
    }

    .custom-check input {
      width: 1.3rem;
      height: 1.3rem;
      cursor: pointer;
      accent-color: #5bc0de;
      margin: 0;
    }

    .status-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #adb5bd;
    }

    .completed-badge {
      background: #28a74530;
      color: #2ecc71;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.6rem 1.5rem 1rem 1.5rem;
      justify-content: flex-end;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: #adb5bd;
      transition: 0.1s;
      font-size: 0.9rem;
      padding: 0.3rem 0.6rem;
      border-radius: 30px;
    }

    .btn-icon:hover {
      background: #2c303a;
      color: #5bc0de;
    }

    .btn-icon.delete:hover {
      color: #e74c3c;
      background: #2c2c2e;
    }

    /* mensaje cuando no hay tareas */
    .empty-space-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 2rem;
      font-size: 1.2rem;
      color: #7f8c8d;
      backdrop-filter: blur(5px);
    }

    #table {
      display: none;
    }

    @media (max-width: 576px) {
      .task-board {
        grid-template-columns: 1fr;
        gap: 1.2rem;
      }
    }

    .filter-active {
      outline: none;
    }

    footer small {
      opacity: 0.7;
    }

    .bg-dark-card {
      background: #1e1f24;
    }
  </style>

  <title>JS Todo List</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="#"><i class="fas fa-cubes me-2"></i>ToDo</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item active">
          <a class="nav-link" href="#">Tablero <span class="sr-only">(current)</span></a>
        </li>
      </ul>
      <form class="form-inline my-2 my-lg-0" id="filters">
        <label class="font-weight-bold text-info mr-3"><i class="fas fa-sliders-h"></i> Filtros</label>
        <input type="radio" name="type" value="all" class="mx-1" checked>
        <label for="all" class="mb-0">Todo</label>
        <input type="radio" name="type" value="completed" class="mx-1">
        <label for="completed" class="mb-0">Completado</label>
        <input type="radio" name="type" value="uncompleted" class="mx-1">
        <label for="uncompleted" class="mr-2 mb-0">No completado</label>

        <input class="form-control form-control-sm mr-sm-2" type="search" name="words" placeholder="Buscar"
          aria-label="Search">
        <button class="btn btn-outline-info btn-sm my-2 my-sm-0" type="submit" id="search">
          <i class="fas fa-search"></i> Buscar
        </button>
      </form>
    </div>
  </nav>

  <!-- Modal -->
  <div class="modal fade" id="modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-edit"></i> Editar tarea</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="alert alert-danger d-none" role="alert" id="modal-alert"></div>
          <form>
            <div class="form-group">
              <label><i class="fas fa-heading"></i> Título</label>
              <input id="modal-title" type="text" class="form-control" placeholder="Ej: Aprender React" />
            </div>
            <div class="form-group">
              <label><i class="fas fa-align-left"></i> Descripción</label>
              <textarea class="form-control" id="modal-description" rows="3" placeholder="Detalles"></textarea>
            </div>
            <div class="form-group">
              <label><i class="far fa-calendar-alt"></i> Fecha límite</label>
              <input id="modal-due-date" type="date" class="form-control" />
            </div>
            <div class="form-group d-inline-flex">
              <label>Completado</label>
              <div class="mt-1 ml-2">
                <input id="modal-completed" type="checkbox" />
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-info" id="modal-btn">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div class="container pt-4">
      <div class="alert alert-danger d-none" role="alert" id="alert"></div>
      <!-- Formulario añadir nueva actividad -->
      <div class="card bg-transparent border-0 mb-5">
        <div class="card-body p-0">
          <div class="form-card"
            style="background: linear-gradient(135deg, rgba(30, 35, 48, 0.95) 0%, rgba(20, 25, 35, 0.98) 100%); backdrop-filter: blur(10px); border-radius: 2rem; border: 1px solid rgba(91, 192, 222, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.3);">
            <div class="p-4">
              <div class="d-flex align-items-center mb-4">
                <div class="rounded-circle me-3"
                  style="background: rgba(91, 192, 222, 0.15); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                  <i class="fas fa-rocket text-info" style="font-size: 1.3rem;"></i>
                </div>
                <h5 class="mb-0 text-info fw-bold">Crear nuevo ToDo</h5>
              </div>

              <form id="addTaskForm">
                <div class="row g-4">
                  <div class="col-md-3">
                    <label class="form-label small fw-semibold" style="color: #a0c4e2;">Titulo</label>
                    <input type="text" id="title" class="form-control" placeholder="Ej: Terminar proyecto" required
                      style="background: rgba(20, 25, 35, 0.8); border: 1px solid rgba(91, 192, 222, 0.3); border-radius: 1rem; color: white;">
                  </div>

                  <div class="col-md-4">
                    <label class="form-label small fw-semibold" style="color: #a0c4e2;">Descripcion</label>
                    <input type="text" id="description" class="form-control" placeholder="Detalles"
                      style="background: rgba(20, 25, 35, 0.8); border: 1px solid rgba(91, 192, 222, 0.3); border-radius: 1rem; color: white;">
                  </div>

                  <div class="col-md-3">
                    <label class="form-label small fw-semibold" style="color: #a0c4e2;">Fecha limite</label>
                    <input type="date" id="due_date" class="form-control"
                      style="background: rgba(20, 25, 35, 0.8); border: 1px solid rgba(91, 192, 222, 0.3); border-radius: 1rem; color: white;">
                  </div>

                  <div class="col-md-2 d-flex align-items-end">
                    <button type="button" class="btn btn-info w-100" id="add"
                      style="border-radius: 1rem; background: linear-gradient(135deg, #5bc0de 0%, #3a8bb9 100%); border: none; padding: 0.6rem; font-weight: 600;">
                      Anadir
                    </button>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
      <div id="taskBoardContainer" class="task-board">
        <div class="empty-space-message">
          <i class="fas fa-space-shuttle fa-2x mb-3"></i><br>
          El espacio está vacío.
        </div>
      </div>
    </div>
  </main>

  <!-- JQuery -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
    integrity="sha256-4+XzXVhsDmqanXGHaHvgh1gMQKX40OUvDEBTu8JcmNs=" crossorigin="anonymous"></script>
  <!-- Bootstrap -->
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
  <!-- JS Code -->
  <script src="js/index.js" type="module"></script>
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/components/alert.js"></script>
  <script src="js/components/filters.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/add-todo.js"></script>
  <script src="js/index.js"></script>
</body>

</html>
